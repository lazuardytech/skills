line-length = 100
target-version = "py310"

[lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "I",   # isort
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "W",   # pycodestyle warnings
]
ignore = [
    "E501",  # line-too-long (formatter handles it)
]

[format]
quote-style = "double"
indent-style = "space"
